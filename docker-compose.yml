version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - mcp-server
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "8000:8000"
    environment:
      - HF_token=${HF_token}
      - HF_MODEL=${HF_MODEL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - WHITECIRCLE_API_KEY=${WHITECIRCLE_API_KEY}
    volumes:
      - .:/app
      - ./token.json:/app/token.json
      - ./drive_token.json:/app/drive_token.json
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - mcp-server
    restart: unless-stopped