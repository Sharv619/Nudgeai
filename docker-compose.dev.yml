version: '3.8'

services:
  frontend-dev:
    build:
      context: ./frontend
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/package*.json:/app/package*.json
    depends_on:
      - mcp-server
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "8000:8000"
    environment:
      - HF_token=${HF_token}
      - HF_MODEL=${HF_MODEL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - WHITECIRCLE_API_KEY=${WHITECIRCLE_API_KEY}
    volumes:
      - .:/app
      - ./token.json:/app/token.json
      - ./drive_token.json:/app/drive_token.json
    restart: unless-stopped